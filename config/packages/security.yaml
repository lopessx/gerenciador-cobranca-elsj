security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                username_parameter: _username
                password_parameter: _password
            logout:
                path: app_logout
                target: app_login
            entry_point: form_login
            remember_me:
                secret:   '%kernel.secret%'
                lifetime: 604800 # 1 week in seconds
                path:     /
                # by default, the feature is enabled by checking a
                # checkbox in the login form (see below), uncomment the
                # following line to always enable it.
                # always_remember_me: true

    access_control:
        # Public routes
        - { path: ^/login$, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/resetting, roles: PUBLIC_ACCESS }
        
        # Admin routes - only for administrators
        - { path: ^/admin/, roles: ROLE_ADMIN }
        - { path: ^/admin/companies, roles: ROLE_ADMIN }
        - { path: ^/admin/companies/new, roles: ROLE_ADMIN }
        - { path: ^/admin/companies/*/edit, roles: ROLE_ADMIN }
        - { path: ^/admin/companies/*/delete, roles: ROLE_ADMIN }
        - { path: ^/admin/patients, roles: [ROLE_ADMIN, ROLE_OPERATOR] }
        - { path: ^/admin/patients/new, roles: [ROLE_ADMIN, ROLE_OPERATOR] }
        - { path: ^/admin/patients/*/edit, roles: [ROLE_ADMIN, ROLE_OPERATOR] }
        - { path: ^/admin/patients/*/delete, roles: [ROLE_ADMIN, ROLE_OPERATOR] }
        - { path: ^/admin/billings, roles: [ROLE_ADMIN, ROLE_OPERATOR] }
        - { path: ^/admin/billings/new, roles: [ROLE_ADMIN, ROLE_OPERATOR] }
        - { path: ^/admin/billings/*/show, roles: [ROLE_ADMIN, ROLE_OPERATOR] }
        - { path: ^/admin/billings/*/pdf, roles: [ROLE_ADMIN, ROLE_OPERATOR] }
        - { path: ^/admin/billings/*/delete, roles: ROLE_ADMIN }
        - { path: ^/admin/users, roles: ROLE_ADMIN }
        - { path: ^/admin/users/new, roles: ROLE_ADMIN }
        - { path: ^/admin/users/*/edit, roles: ROLE_ADMIN }
        - { path: ^/admin/users/*/delete, roles: ROLE_ADMIN }
        
        # Dashboard - accessible to all authenticated users
        - { path: ^/dashboard, roles: [ROLE_ADMIN, ROLE_OPERATOR, ROLE_READER] }
        - { path: ^/, roles: [ROLE_ADMIN, ROLE_OPERATOR, ROLE_READER] }
        
        # User profile - accessible to authenticated users
        - { path: ^/profile, roles: IS_AUTHENTICATED_FULLY }
        
        # Default: require authentication
        - { path: ^/, roles: IS_AUTHENTICATED_ANONYMOUSLY }

    # Easy way to control access for large sections of your site
    # Note: Only the *first* access control that matches will be used